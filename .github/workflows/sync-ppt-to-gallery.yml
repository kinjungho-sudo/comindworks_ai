name: Sync PPT to Gallery

on:
  push:
    paths:
      - 'ppt/**.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout comindworks_ai
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed PPT files
        id: changed
        run: |
          # push된 .html 파일 목록 (ppt/ 폴더만)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'ppt/*.html' | grep -v '^ppt/index.html' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Checkout starter-kit
        if: steps.changed.outputs.files != ''
        uses: actions/checkout@v4
        with:
          repository: kinjungho-sudo/starter-kit
          token: ${{ secrets.STARTER_KIT_PAT }}
          path: starter-kit

      - name: Generate gallery md files
        if: steps.changed.outputs.files != ''
        run: |
          GALLERY_DIR="starter-kit/src/content/gallery"
          mkdir -p "$GALLERY_DIR"

          for FILE in ${{ steps.changed.outputs.files }}; do
            FILENAME=$(basename "$FILE" .html)

            # 이미 등록된 파일은 건너뜀
            if ls "$GALLERY_DIR"/*"${FILENAME}"* 2>/dev/null | grep -q .; then
              echo "이미 등록됨: $FILENAME"
              continue
            fi

            # HTML에서 <title> 태그 추출
            TITLE=$(grep -oP '(?<=<title>)[^<]+' "$FILE" | head -1 | sed 's/"/\\"/g')
            if [ -z "$TITLE" ]; then
              TITLE="$FILENAME"
            fi

            # 날짜 추출 (파일명에서 YYYY-MM-DD 패턴)
            DATE=$(echo "$FILENAME" | grep -oP '\d{4}-\d{2}-\d{2}' | head -1 || echo "$(date +%Y-%m-%d)")

            # GitHub Pages URL
            PPT_URL="https://kinjungho-sudo.github.io/comindworks_ai/ppt/${FILENAME}.html"

            # md 파일 생성
            cat > "$GALLERY_DIR/ppt-${FILENAME}.md" << MDEOF
          ---
          title: "$TITLE"
          type: ppt
          link: "$PPT_URL"
          maker: "정호"
          created: "$DATE"
          tags: ["PPT"]
          ---
          MDEOF

            echo "생성: ppt-${FILENAME}.md → $TITLE"
          done

      - name: Commit and push to starter-kit
        if: steps.changed.outputs.files != ''
        run: |
          cd starter-kit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/gallery/
          git diff --cached --quiet && echo "변경 없음" && exit 0
          git commit -m "auto: PPT 갤러리 등록 $(date '+%Y-%m-%d')"
          git push
